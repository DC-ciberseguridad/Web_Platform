name: Deploy Web Platform

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
    
      # ===================== 
      # SETUP TERRAFORM
      # ===================== 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0" # O la versión que uses    

     # ===================== 
     # AWS CREDENTIALS 
     # =====================    
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # =====================
      # TERRAFORM INIT
      # =====================
      - name: Terraform Init
        working-directory: ./iac
        run: terraform init     

      # =====================
      # TERRAFORM APPLY
      # =====================
      - name: Terraform Apply
        working-directory: ./iac
        env:
          TF_VAR_my_ip: '["${{ env.MY_IP }}"]'
          TF_VAR_ssh_public_key: ${{ vars.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve

      # =====================
      # GET IP HOST & ECR
      # =====================  
      - name: Get Terraform Outputs
        working-directory: ./iac
        run: |
          echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV
          # Extraemos solo el dominio del ECR (sin el nombre del repo)
          echo "ECR_REGISTRY=$(terraform output -raw ecr_nextcloud_url | cut -d'/' -f1)" >> $GITHUB_ENV
          echo "SG_ID=$(terraform output -raw security_group_id)" >> $GITHUB_ENV

      # =====================
      # BUILD & PUSH TO ECR
      # =====================

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push images
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/nextcloud-app:latest ./services/nextcloud
          docker build -t ${{ env.ECR_REGISTRY }}/nextcloud-nginx:latest ./services/nginx     
          docker push ${{ env.ECR_REGISTRY }}/nextcloud-app:latest
          docker push ${{ env.ECR_REGISTRY }}/nextcloud-nginx:latest

      # =====================
      # GET RUNNER IP
      # =====================
      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Add GitHub IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ env.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 || true 

      # =====================
      # COPY CODE
      # =====================
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/Web_Platform"

      # =====================
      # CREATE .ENV
      # =====================
      - name: Create env file on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/Web_Platform/docker

            cat <<EOF > .env
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            NEXTCLOUD_ADMIN_USER=${{ secrets.NEXTCLOUD_ADMIN_USER }}
            NEXTCLOUD_ADMIN_PASSWORD=${{ secrets.NEXTCLOUD_ADMIN_PASSWORD }}
            ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            EOF

      # =====================
      # DEPLOY
      # =====================
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Instalar Docker de forma genérica
            sudo apt-get update -y
            sudo apt-get install -y docker-compose-v2
            sudo systemctl start docker
            
            # 2. Obtener el Token (esto se ejecuta en la EC2)
            # Nota: El Runner de GitHub le pasa las credenciales de AWS a la instancia 
            # gracias al IAM Role que configuraste en Terraform.
            export TOKEN=$(aws ecr get-login-password --region us-east-1)
            
            # 3. Login y Deploy directo (sin scripts externos para evitar fallos de rutas)
            echo "$TOKEN" | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            
            cd /home/ubuntu/Web_Platform
            sudo docker compose -f docker/docker-compose.prod.yml pull
            sudo docker compose -f docker/docker-compose.prod.yml up -d

      # =====================
      # REMOVE GITHUB IP
      # =====================      

      - name: Remove GitHub IP from Security Group (Opcional)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ env.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 || true    
           